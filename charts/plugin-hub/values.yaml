replicaCount: 1

image:
  repository: ghcr.io/openeverest/plugin-hub
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  port: 8080

plugin:
  displayName: "Plugin Hub"
  description: "Browse available OpenEverest plugins and providers from the official hub catalog and see which are installed on this cluster."
  vendor: "OpenEverest"
  enabled: true
  bundlePath: "/main.js"
  extensionPoints:
    - type: route
      path: /plugin-hub
      label: Plugin Hub
    - type: sidebarItem
      path: /plugin-hub
      label: Plugin Hub
      icon: "/icon.png"

# Optional override for the Everest API URL. When left empty the backend
# auto-discovers the everest Service via Kubernetes-injected env vars
# (EVEREST_SERVICE_HOST / EVEREST_SERVICE_PORT). Only set this for local dev
# or non-standard deployments.
everestAPIURL: ""

# Override the catalog index URL. Defaults to the official OpenEverest hub.
hubIndexURL: ""

# Catalog cache TTL in seconds. Defaults to 300 (5 minutes) when empty.
cacheTTLSeconds: ""

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
