apiVersion: v1
kind: Service
metadata:
  name: {{ include "plugin-hub.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plugin-hub.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "plugin-hub.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
